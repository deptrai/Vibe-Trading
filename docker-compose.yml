services:
  vibe-trading:
    build: .
    ports:
      - "127.0.0.1:8899:8899"
    env_file:
      - agent/.env
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
      - kg-data:/app/agent/kg_data
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  rl-worker:
    build: .
    command: celery -A src.worker worker -Q rl_optimization -c 1 --max-memory-per-child=512000
    env_file:
      - agent/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    restart: unless-stopped
    depends_on:
      - redis

  kg-worker:
    build: .
    command: celery -A src.worker worker -B -Q kg_sync -c 1 --max-memory-per-child=512000
    env_file:
      - agent/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - kg-data:/app/agent/kg_data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped
    depends_on:
      - redis

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started

volumes:
  vibe-runs:
  vibe-sessions:
  kg-data:
